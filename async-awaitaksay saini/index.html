<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Profile Card</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      width: 380px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      text-align: center;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #238636;
      margin-bottom: 16px;
    }
    h2 {
      margin: 8px 0;
      color: #58a6ff;
    }
    .info {
      margin: 12px 0;
      font-size: 1.05rem;
    }
    .stats {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }
    .stat {
      background: #21262d;
      padding: 12px 20px;
      border-radius: 8px;
      flex: 1;
      margin: 0 6px;
    }
    .error {
      color: #f85149;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="card" id="profile-card">
  <img id="avatar" class="avatar" src="" alt="Avatar" />
  <h2 id="name"></h2>
  <div class="info" id="bio"></div>
  <div class="stats">
    <div class="stat">Repos: <strong id="repos">0</strong></div>
    <div class="stat">Followers: <strong id="followers">0</strong></div>
    <div class="stat">Following: <strong id="following">0</strong></div>
  </div>
  <p id="error-msg" class="error"></p>
</div>

<script src="index.js">
  const USER_API = 'https://api.github.com/users/nishant8860';

  async function showGitHubProfile() {
    const errorEl = document.getElementById('error-msg');
    errorEl.textContent = '';

    try {
      const response = await fetch(USER_API);
      
      if (!response.ok) {
        throw new Error(`Error ${response.status}: ${response.statusText}`);
      }

      const user = await response.json();

      // Update UI
      document.getElementById('avatar').src = user.avatar_url;
      document.getElementById('name').textContent = user.name || user.login;
      document.getElementById('bio').textContent = user.bio || 'No bio available';
      document.getElementById('repos').textContent = user.public_repos;
      document.getElementById('followers').textContent = user.followers;
      document.getElementById('following').textContent = user.following;

    } catch (err) {
      errorEl.textContent = err.message;
      console.error(err);
    }
  }

  // Call karo page load hone pe
  window.onload = showGitHubProfile;
</script>

</body>
</html>
